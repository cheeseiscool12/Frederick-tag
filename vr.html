<!DOCTYPE html>
<html>
  <head>
    <title>Frederick Tag VR</title>
    <link rel="manifest" href="manifest.webmanifest">
    
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      AFRAME.registerComponent('gorilla-locomotion', {
        init: function () {
          this.rig = document.querySelector('#player-rig');
          this.leftHand = document.querySelector('#leftHand');
          this.rightHand = document.querySelector('#rightHand');
          this.prevLeft = new THREE.Vector3();
          this.prevRight = new THREE.Vector3();
        },
        tick: function () {
          if (!this.rig.body) return;

          let leftPos = new THREE.Vector3();
          let rightPos = new THREE.Vector3();
          this.leftHand.object3D.getWorldPosition(leftPos);
          this.rightHand.object3D.getWorldPosition(rightPos);

          let impulse = new CANNON.Vec3(0, 0, 0);
          let touchingGround = false;

          // Check if hands are hitting the floor (Y height approx 0.15)
          if (leftPos.y <= 0.15) {
            touchingGround = true;
            let delta = leftPos.clone().sub(this.prevLeft);
            impulse.x -= delta.x * 250;
            impulse.y -= delta.y * 250;
            impulse.z -= delta.z * 250;
          }

          if (rightPos.y <= 0.15) {
            touchingGround = true;
            let delta = rightPos.clone().sub(this.prevRight);
            impulse.x -= delta.x * 250;
            impulse.y -= delta.y * 250;
            impulse.z -= delta.z * 250;
          }

          if (touchingGround) {
            if (this.rig.body.velocity.y < 0) this.rig.body.velocity.y = 0;
            
            if (Math.abs(impulse.x) > 0 || Math.abs(impulse.y) > 0 || Math.abs(impulse.z) > 0) {
              this.rig.body.applyImpulse(impulse, new CANNON.Vec3().copy(this.rig.object3D.position));
              try {
                this.leftHand.components['tracked-controls'].controller.gamepad.hapticActuators[0].pulse(0.3, 50);
                this.rightHand.components['tracked-controls'].controller.gamepad.hapticActuators[0].pulse(0.3, 50);
              } catch (e) {}
            }
          }

          this.prevLeft.copy(leftPos);
          this.prevRight.copy(rightPos);
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="gravity: -9.8" gorilla-locomotion>
      
      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#2d5a27" static-body></a-plane>

      <a-entity id="player-rig" 
                dynamic-body="mass: 10; shape: sphere; sphereRadius: 0.2; fixedRotation: true; angularDamping: 1" 
                position="0 10 0">
        <a-camera look-controls="pointerLockEnabled: true"></a-camera>
        
        <a-box id="leftHand" hand-controls="hand: left" width="0.25" height="0.12" depth="0.25" color="#4b3621">
          <a-box position="0 0 -0.1" width="0.15" height="0.06" depth="0.12" color="#3b2b1a"></a-box>
        </a-box>
        
        <a-box id="rightHand" hand-controls="hand: right" width="0.25" height="0.12" depth="0.25" color="#4b3621">
          <a-box position="0 0 -0.1" width="0.15" height="0.06" depth="0.12" color="#3b2b1a"></a-box>
        </a-box>
      </a-entity>

    </a-scene>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
  </body>
</script>
</html>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
