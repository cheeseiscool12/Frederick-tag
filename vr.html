<!DOCTYPE html>
<html>
  <head>
    <title>Frederick Tag VR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      AFRAME.registerComponent('gorilla-movement', {
        init: function () {
          this.prevPos = new THREE.Vector3();
          this.el.addEventListener('collide', (e) => {
            const rig = document.querySelector('#rig');
            const handPos = new THREE.Vector3();
            this.el.object3D.getWorldPosition(handPos);
            
            // Calculate how fast the hand was moving on impact
            const velocity = handPos.clone().sub(this.prevPos).length();
            
            if (velocity > 0.01) { // Only jump if hand is moving
                const jumpStrength = velocity * 150; // Adjust for higher/lower jumps
                const force = new CANNON.Vec3(0, jumpStrength, -jumpStrength * 0.5);
                rig.body.applyImpulse(force, new CANNON.Vec3().copy(rig.object3D.position));
            }
          });
        },
        tick: function () {
          // Track hand position every frame to calculate speed
          this.el.object3D.getWorldPosition(this.prevPos);
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="gravity: -9.8; debug: false; iterations: 10">
      
      <a-sky color="#222"></a-sky>
      <a-plane static-body position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#444"></a-plane>
      
      <a-box static-body position="0 0.5 -5" width="4" height="1" depth="4" color="orange"></a-box>
      <a-box static-body position="-6 1.5 -8" width="3" height="3" depth="3" color="red"></a-box>

      <a-entity id="rig" dynamic-body="mass: 10; fixedRotation: true" position="0 2 0">
        <a-camera look-controls="pointerLockEnabled: true"></a-camera>
        
        <a-sphere id="leftHand" gorilla-movement static-body="shape: sphere" 
                  hand-controls="hand: left" radius="0.15" color="blue" opacity="0.7">
        </a-sphere>
        
        <a-sphere id="rightHand" gorilla-movement static-body="shape: sphere" 
                  hand-controls="hand: right" radius="0.15" color="red" opacity="0.7">
        </a-sphere>
      </a-entity>

    </a-scene>
  </body>
</html>
