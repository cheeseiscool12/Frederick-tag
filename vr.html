<!DOCTYPE html>
<html>
  <head>
    <title>Frederick Tag 3D</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      AFRAME.registerComponent('gorilla-hand-logic', {
        init: function () {
          this.el.addEventListener('collide', (e) => {
            const rig = document.querySelector('#player-rig');
            // If hand hits a static object (ground/wall)
            if (e.detail.body.el.getAttribute('static-body') !== null) {
              // Pushes the player based on the hand's downward motion
              const impulse = new CANNON.Vec3(0, 7, -4); 
              rig.body.applyImpulse(impulse, new CANNON.Vec3().copy(rig.object3D.position));
              
              // Vibration/Haptics for that 2026 "feel"
              if (this.el.components['tracked-controls']) {
                this.el.components['tracked-controls'].controller.gamepad.hapticActuators[0].pulse(0.5, 100);
              }
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="gravity: -9.8; iterations: 20">
      
      <a-sky color="#87CEEB"></a-sky>
      <a-plane static-body position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#2d5a27"></a-plane>
      
      <a-cylinder static-body position="-5 2 -10" radius="1" height="4" color="#5C4033"></a-cylinder>
      <a-cylinder static-body position="5 2 -8" radius="1" height="4" color="#5C4033"></a-cylinder>

      <a-entity id="player-rig" dynamic-body="mass: 15; fixedRotation: true" position="0 2 0">
        <a-camera look-controls></a-camera>
        
        <a-box id="leftHand" gorilla-hand-logic static-body="shape: box" 
               hand-controls="hand: left" width="0.2" height="0.1" depth="0.2" color="#4b3621">
          <a-box position="0 0 -0.1" width="0.1" height="0.05" depth="0.1" color="#3b2b1a"></a-box> </a-box>
        
        <a-box id="rightHand" gorilla-hand-logic static-body="shape: box" 
               hand-controls="hand: right" width="0.2" height="0.1" depth="0.2" color="#4b3621">
          <a-box position="0 0 -0.1" width="0.1" height="0.05" depth="0.1" color="#3b2b1a"></a-box> </a-box>
      </a-entity>

    </a-scene>
  </body>
</html>
