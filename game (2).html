<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gorilla Arena — FREDERICK COMPANY</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    /* ─── VR LOADING SCREEN (shown when VR button pressed) ─── */
    #fc-vr-screen {
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: #050505;
      flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Georgia', serif;
      pointer-events: none;
    }
    #fc-vr-screen.show { display: flex; animation: fcFadeIn 0.6s ease forwards; }
    #fc-vr-screen.fade-out { animation: fcFadeOut 1.2s ease forwards; }
    .fc-logo {
      font-size: 52px; font-weight: bold;
      letter-spacing: 8px; color: #d4af37;
      text-transform: uppercase;
      text-shadow: 0 0 40px #d4af37cc, 0 0 80px #d4af3744;
      animation: fcPulse 2s infinite alternate;
    }
    .fc-sub {
      margin-top: 14px; font-size: 13px;
      letter-spacing: 14px; color: #555;
      text-transform: uppercase;
    }
    .fc-divider {
      margin: 32px 0; width: 180px; height: 1px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }
    .fc-tagline {
      font-size: 15px; color: #888; letter-spacing: 4px;
      font-style: italic;
    }
    .fc-bar-wrap {
      margin-top: 48px; width: 280px; height: 2px;
      background: #1a1a1a; border-radius: 1px; overflow: hidden;
    }
    .fc-bar {
      height: 100%; width: 0; background: #d4af37;
      animation: fcLoad 2.8s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes fcFadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes fcFadeOut { from{opacity:1} to{opacity:0} }
    @keyframes fcPulse   { from{opacity:.7;text-shadow:0 0 20px #d4af3788} to{opacity:1;text-shadow:0 0 60px #d4af37cc} }
    @keyframes fcLoad    { 0%{width:0} 70%{width:85%} 100%{width:100%} }

    /* ─── DEATH OVERLAY ─── */
    #death-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9000;
      flex-direction: column; align-items: center; justify-content: center;
      background: transparent;
      pointer-events: none;
      transition: background 0.8s;
    }
    #death-overlay.active { display: flex; background: rgba(120,0,0,0.22); }
    #you-died-text {
      font-family: 'Georgia', serif;
      font-size: 80px; font-weight: bold; letter-spacing: 10px;
      color: #cc0000; text-transform: uppercase;
      text-shadow: 0 0 60px #ff000099, 0 2px 0 #000;
      opacity: 0; transition: opacity 1.2s;
    }
    #you-died-text.show { opacity: 1; }
    #respawn-hint {
      margin-top: 22px; font-family: monospace;
      font-size: 16px; letter-spacing: 4px; color: #ccc;
      opacity: 0; transition: opacity 0.6s 0.3s;
    }
    #respawn-hint.show { opacity: 0.85; }
    #respawn-bar-wrap {
      margin-top: 18px; width: 240px; height: 5px;
      background: #2a2a2a; border-radius: 3px; overflow: hidden;
      opacity: 0; transition: opacity 0.5s;
    }
    #respawn-bar-wrap.show { opacity: 1; }
    #respawn-bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #ff3333, #ff8844);
      border-radius: 3px; transition: width 3s linear;
    }
  </style>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/networked-aframe@^0.11.0/dist/networked-aframe.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.5.0/socket.io.slim.js"></script>

  <script>
  // ════════════════════════════════════════════════════
  // GLOBALS
  // ════════════════════════════════════════════════════
  window._money   = 15;
  window._isDead  = false;
  window._gravity = null;

  // ════════════════════════════════════════════════════
  // VR LOADING SCREEN — intercept the VR button
  // ════════════════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', () => {
    // Watch for the VR button being added by A-Frame
    const tryHook = setInterval(() => {
      const vrBtn = document.querySelector('.a-enter-vr-button, #aframe-vr-mode-ui button, .a-enter-vr');
      if (!vrBtn) return;
      clearInterval(tryHook);

      vrBtn.addEventListener('click', () => {
        const screen = document.getElementById('fc-vr-screen');
        screen.classList.add('show');
        screen.classList.remove('fade-out');
        // Reset bar animation
        const bar = screen.querySelector('.fc-bar');
        bar.style.animation = 'none';
        void bar.offsetWidth; // reflow
        bar.style.animation = 'fcLoad 2.8s cubic-bezier(.4,0,.2,1) forwards';

        setTimeout(() => {
          screen.classList.add('fade-out');
          setTimeout(() => {
            screen.classList.remove('show','fade-out');
          }, 1200);
        }, 3000);
      }, true);
    }, 200);
  });

  // ════════════════════════════════════════════════════
  // GRAVITY
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('gravity-body', {
    init: function () {
      this.velY = 0; this.bypass = false;
      window._gravity = this;
    },
    tick: function (t, dt) {
      if (this.bypass || window._isDead) return;
      const sec = Math.min(dt, 50) / 1000;
      const pos = this.el.object3D.position;
      this.velY -= 12 * sec;
      pos.y += this.velY * sec;
      if (pos.y <= 0) { pos.y = 0; this.velY = 0; }
    }
  });

  // ════════════════════════════════════════════════════
  // GORILLA LOCOMOTION  — smooth velocity-based swing
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('gorilla-hand', {
    init: function () {
      this.gripping  = false;
      this.prevPos   = new THREE.Vector3();
      this.vel       = new THREE.Vector3();   // carry-over velocity
      this.wasGrip   = false;

      this.el.addEventListener('gripdown', () => {
        if (window._isDead) return;
        this.gripping = true;
        this.el.object3D.getWorldPosition(this.prevPos);
        this.vel.set(0,0,0);
        if (window._gravity) window._gravity.velY = 0;
      });
      this.el.addEventListener('gripup', () => {
        this.gripping = false;
        // transfer horizontal momentum to rig so it keeps sliding a bit
        if (window._gravity) {
          window._gravity.velY = Math.max(window._gravity.velY, this.vel.y * 4);
        }
      });
    },
    tick: function (t, dt) {
      const cur = new THREE.Vector3();
      this.el.object3D.getWorldPosition(cur);
      const sec = Math.min(dt, 50) / 1000;

      if (this.gripping && !window._isDead) {
        const rig = document.querySelector('#rig');
        if (rig) {
          // world-space delta: hand moved → world moved opposite
          const d = new THREE.Vector3().subVectors(this.prevPos, cur);
          // scale: 1 unit of hand motion = 3 units of world travel
          d.multiplyScalar(3.5);
          // clamp per-frame movement so no teleporting
          d.clampLength(0, 0.35);
          rig.object3D.position.x += d.x;
          rig.object3D.position.z += d.z;
          rig.object3D.position.y = Math.max(0, rig.object3D.position.y + d.y);
          if (window._gravity) window._gravity.velY = 0;
          // store velocity for momentum handoff
          this.vel.copy(d).divideScalar(Math.max(sec, 0.001));
        }
      }
      this.prevPos.copy(cur);
    }
  });

  // ════════════════════════════════════════════════════
  // HOOKSHOT (lives on hand entity)
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('hookshot-hand', {
    init: function () {
      this.hooked = false; this.hasGun = false;
      this.gunEl  = null;
      this.hookPt = new THREE.Vector3();

      this.rope = document.createElement('a-entity');
      this.rope.setAttribute('visible', 'false');
      document.querySelector('a-scene').appendChild(this.rope);
      const seg = document.createElement('a-cylinder');
      seg.setAttribute('radius','0.012'); seg.setAttribute('color','#c8a060');
      seg.setAttribute('segments-radial','4');
      this.rope.appendChild(seg); this.ropeSeg = seg;

      this.tip = document.createElement('a-sphere');
      this.tip.setAttribute('radius','0.07'); this.tip.setAttribute('color','#bbb');
      this.tip.setAttribute('visible','false');
      document.querySelector('a-scene').appendChild(this.tip);

      this.el.addEventListener('triggerdown', () => {
        if (!this.hasGun || window._isDead) return;
        this.hooked ? this._release() : this._fire();
      });
      this.el.addEventListener('abuttondown', () => { if (this.hasGun) this._drop(); });
      this.el.addEventListener('xbuttondown', () => { if (this.hasGun) this._drop(); });
    },
    equip: function (gunEl) {
      this.gunEl = gunEl; this.hasGun = true;
      this.el.object3D.add(gunEl.object3D);
      gunEl.object3D.position.set(0, -0.05, -0.15);
      gunEl.object3D.rotation.set(0, 0, 0);
    },
    _fire: function () {
      const p = new THREE.Vector3(), d = new THREE.Vector3();
      this.el.object3D.getWorldPosition(p);
      this.el.object3D.getWorldDirection(d); d.negate();
      this.hookPt.copy(p).addScaledVector(d, 20);
      if (this.hookPt.y < 1) this.hookPt.y = 1;
      this.hooked = true;
      this.tip.setAttribute('visible','true');
      this.tip.object3D.position.copy(this.hookPt);
      if (window._gravity) { window._gravity.bypass = true; window._gravity.velY = 0; }
    },
    _release: function () {
      this.hooked = false;
      this.rope.setAttribute('visible','false');
      this.tip.setAttribute('visible','false');
      if (window._gravity) window._gravity.bypass = false;
    },
    _drop: function () {
      this._release(); this.hasGun = false;
      if (this.gunEl) {
        document.querySelector('a-scene').object3D.attach(this.gunEl.object3D);
        const rig = document.querySelector('#rig');
        if (rig) {
          const p = rig.object3D.position;
          this.gunEl.object3D.position.set(p.x + 0.5, p.y + 1, p.z - 0.5);
        }
        this.gunEl = null;
      }
    },
    tick: function (t, dt) {
      if (!this.hasGun || !this.hooked) return;
      const rig = document.querySelector('#rig'); if (!rig) return;
      const hp = new THREE.Vector3();
      this.el.object3D.getWorldPosition(hp);
      const len = hp.distanceTo(this.hookPt);
      if (len < 0.8) { this._release(); return; }
      const mid = new THREE.Vector3().addVectors(hp, this.hookPt).multiplyScalar(0.5);
      const dir = new THREE.Vector3().subVectors(this.hookPt, hp).normalize();
      this.rope.object3D.position.copy(mid);
      this.rope.object3D.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
      this.ropeSeg.setAttribute('height', len);
      this.rope.setAttribute('visible','true');
      this.tip.object3D.position.copy(this.hookPt);
      const pull = new THREE.Vector3().subVectors(this.hookPt, rig.object3D.position);
      pull.normalize().multiplyScalar(15 * Math.min(dt,50) / 1000);
      rig.object3D.position.add(pull);
    }
  });

  // ════════════════════════════════════════════════════
  // PICKUP HAND  (A=right, X=left picks up gun)
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('pickup-hand', {
    schema: { hand: { default: 'right' } },
    init: function () {
      const btn = this.data.hand === 'right' ? 'abuttondown' : 'xbuttondown';
      this.el.addEventListener(btn, () => {
        const hsc = this.el.components['hookshot-hand'];
        if (!hsc) return;
        if (hsc.hasGun) { hsc._drop(); return; }
        const gun = document.querySelector('#hookshot-gun');
        if (!gun) return;
        const hp = new THREE.Vector3(), gp = new THREE.Vector3();
        this.el.object3D.getWorldPosition(hp);
        gun.object3D.getWorldPosition(gp);
        if (hp.distanceTo(gp) < 2.0) hsc.equip(gun);
      });
    }
  });

  // ════════════════════════════════════════════════════
  // GRENADE HAND  (B/Y starts 3-sec fuse — explodes killing YOU)
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('grenade-hand', {
    init: function () {
      this.hasGrenade = false;
      this.fuseActive = false;
      this.el.addEventListener('bbuttondown', () => this._activate());
      this.el.addEventListener('ybuttondown', () => this._activate());
    },

    armGrenade: function () {
      this.hasGrenade = true;
      this.fuseActive = false;
      // show grenade on hand
      let g = this.el.querySelector('.held-grenade');
      if (!g) {
        g = document.createElement('a-sphere');
        g.setAttribute('class','held-grenade');
        g.setAttribute('radius','0.065');
        g.setAttribute('color','#3a5a22');
        g.setAttribute('position','0 0.05 -0.12');
        this.el.appendChild(g);
      }
      g.setAttribute('visible','true');
      g.setAttribute('color','#3a5a22');
    },

    _activate: function () {
      if (!this.hasGrenade || this.fuseActive || window._isDead) return;
      this.fuseActive = true;
      this.hasGrenade = false;

      // grenade flashes red while fuse burns
      const hg = this.el.querySelector('.held-grenade');
      let flash = false;
      const flashInterval = setInterval(() => {
        if (!hg) return;
        hg.setAttribute('color', flash ? '#3a5a22' : '#ff2200');
        flash = !flash;
      }, 200);

      // show countdown label above hand
      const lbl = document.createElement('a-text');
      lbl.setAttribute('value','3');
      lbl.setAttribute('position','0 0.18 -0.08');
      lbl.setAttribute('align','center');
      lbl.setAttribute('color','#ff4400');
      lbl.setAttribute('width','0.6');
      this.el.appendChild(lbl);

      let count = 3;
      const countInterval = setInterval(() => {
        count--;
        if (count > 0) lbl.setAttribute('value', String(count));
      }, 1000);

      // 3 seconds → BOOM
      setTimeout(() => {
        clearInterval(flashInterval);
        clearInterval(countInterval);
        if (hg) hg.setAttribute('visible','false');
        if (lbl && lbl.parentNode) lbl.parentNode.removeChild(lbl);
        this.fuseActive = false;

        // explode at player's current position
        const rig = document.querySelector('#rig');
        const pos = rig
          ? rig.object3D.position.clone()
          : new THREE.Vector3(0, 0, 0);
        _explode(pos, null);
      }, 3000);
    }
  });

  // ════════════════════════════════════════════════════
  // EXPLOSION + DEATH
  // ════════════════════════════════════════════════════
  function _explode(pos, grenadeEl) {
    const scene = document.querySelector('a-scene');
    if (grenadeEl && grenadeEl.parentNode) grenadeEl.parentNode.removeChild(grenadeEl);

    // flash
    const flash = document.createElement('a-sphere');
    flash.setAttribute('radius','2.8'); flash.setAttribute('color','#ff6600');
    flash.setAttribute('opacity','0.9');
    flash.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
    scene.appendChild(flash);
    setTimeout(() => { flash.setAttribute('color','#ffdd00'); flash.setAttribute('radius','4'); }, 80);
    setTimeout(() => { flash.setAttribute('opacity','0.25'); flash.setAttribute('radius','5'); }, 200);
    setTimeout(() => flash.parentNode && flash.parentNode.removeChild(flash), 400);

    // smoke
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('a-sphere');
      s.setAttribute('radius', 0.8 + i * 0.4);
      s.setAttribute('color','#444'); s.setAttribute('opacity','0.45');
      s.setAttribute('position', `${pos.x + (Math.random()-0.5)*2} ${pos.y + i*0.8} ${pos.z + (Math.random()-0.5)*2}`);
      scene.appendChild(s);
      setTimeout(() => s.parentNode && s.parentNode.removeChild(s), 1500);
    }

    // blast radius check
    const rig = document.querySelector('#rig');
    if (rig && !window._isDead) {
      if (rig.object3D.position.distanceTo(pos) < 3.8) _die(pos);
    }
  }

  // ════════════════════════════════════════════════════
  // DEATH  →  spectator cam  →  YOU DIED  →  hold-Y respawn
  // ════════════════════════════════════════════════════
  function _die(blastPos) {
    if (window._isDead) return;
    window._isDead = true;
    if (window._gravity) { window._gravity.bypass = true; window._gravity.velY = 0; }

    const rig  = document.querySelector('#rig');
    const head = document.querySelector('#head');
    const scene = document.querySelector('a-scene');

    // capture death position
    const dp = rig.object3D.position.clone();

    // tilt body to look dead (fall sideways)
    rig.object3D.rotation.z = Math.PI / 2;

    // ── spectator / 3rd person camera ──
    // place it 4m back and 3m above the death spot, looking down at body
    const specCam = document.createElement('a-entity');
    specCam.setAttribute('id','spec-cam');
    specCam.setAttribute('camera','active:true; fov:75');
    specCam.object3D.position.set(dp.x, dp.y + 3.5, dp.z + 5);
    // look toward the body
    const lookTarget = new THREE.Vector3(dp.x, dp.y + 0.5, dp.z);
    specCam.object3D.lookAt(lookTarget);
    scene.appendChild(specCam);

    // disable player camera
    if (head) head.setAttribute('camera','active:false');

    // red vignette overlay
    const overlay = document.getElementById('death-overlay');
    overlay.classList.add('active');

    // ── after 7 seconds: YOU DIED text ──
    setTimeout(() => {
      document.getElementById('you-died-text').classList.add('show');
      setTimeout(() => {
        document.getElementById('respawn-hint').classList.add('show');
        document.getElementById('respawn-bar-wrap').classList.add('show');
        _listenForRespawn();
      }, 800);
    }, 7000);
  }

  function _listenForRespawn() {
    let holding = false, holdTimer = null;
    const bar = document.getElementById('respawn-bar');

    function startHold() {
      if (holding) return;
      holding = true;
      bar.style.width = '100%';
      holdTimer = setTimeout(_respawn, 3000);
    }
    function stopHold() {
      if (!holding) return;
      holding = false;
      clearTimeout(holdTimer);
      bar.style.transition = 'none';
      bar.style.width = '0';
      void bar.offsetWidth;
      bar.style.transition = 'width 3s linear';
    }

    const lh = document.querySelector('#leftHand');
    const rh = document.querySelector('#rightHand');
    if (lh) {
      lh.addEventListener('ybuttondown', startHold);
      lh.addEventListener('ybuttonup',   stopHold);
    }
    if (rh) {
      rh.addEventListener('bbuttondown', startHold);
      rh.addEventListener('bbuttonup',   stopHold);
    }
  }

  function _respawn() {
    window._isDead = false;
    if (window._gravity) { window._gravity.bypass = false; window._gravity.velY = 0; }

    const rig   = document.querySelector('#rig');
    const head  = document.querySelector('#head');
    const spec  = document.querySelector('#spec-cam');

    // reset rig
    rig.object3D.position.set(0, 0, 0);
    rig.object3D.rotation.set(0, 0, 0);

    // restore first-person camera
    if (head) head.setAttribute('camera','active:true');
    if (spec && spec.parentNode) spec.parentNode.removeChild(spec);

    // reset UI
    const ov = document.getElementById('death-overlay');
    ov.classList.remove('active');
    ov.style.background = '';
    document.getElementById('you-died-text').classList.remove('show');
    document.getElementById('respawn-hint').classList.remove('show');
    document.getElementById('respawn-bar-wrap').classList.remove('show');
    const bar = document.getElementById('respawn-bar');
    bar.style.transition = 'none'; bar.style.width = '0';

    // clear chicken bite UI
    const warn = document.getElementById('chicken-bite-warn');
    if (warn) warn.style.display = 'none';
    window._chickenPoison = false;
  }

  // ════════════════════════════════════════════════════
  // SPAWN EGG IN NEST
  // ════════════════════════════════════════════════════
  function _spawnEgg() {
    // Remove old egg if any
    const old = document.querySelector('#chicken-egg');
    if (old && old.parentNode) old.parentNode.removeChild(old);
    window._eggStolen = false;

    const scene = document.querySelector('a-scene');
    const egg   = document.createElement('a-entity');
    egg.setAttribute('id','chicken-egg');
    egg.setAttribute('position','-12 0.55 -14');
    egg.setAttribute('egg-pickup','');

    const shell = document.createElement('a-sphere');
    shell.setAttribute('radius','0.14');
    shell.setAttribute('color','#f5e6c8');
    shell.setAttribute('segments-height','8');
    shell.setAttribute('segments-width','8');
    shell.setAttribute('scale','1 1.3 1');
    egg.appendChild(shell);

    const spots = document.createElement('a-sphere');
    spots.setAttribute('radius','0.145');
    spots.setAttribute('color','#e8c8a0');
    spots.setAttribute('opacity','0.4');
    spots.setAttribute('segments-height','5');
    spots.setAttribute('segments-width','5');
    spots.setAttribute('scale','1 1.3 1');
    egg.appendChild(spots);

    const lbl = document.createElement('a-text');
    lbl.setAttribute('class','egg-label');
    lbl.setAttribute('value','EGG\n$200-300\nGRIP');
    lbl.setAttribute('position','0 0.28 0');
    lbl.setAttribute('align','center');
    lbl.setAttribute('width','0.9');
    lbl.setAttribute('color','#ffdd88');
    egg.appendChild(lbl);

    scene.appendChild(egg);
  }

  // ════════════════════════════════════════════════════
  // WRIST WATCH  (on left hand, shows $money + player count)
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('wrist-watch', {
    init: function () {
      // watch body
      const face = document.createElement('a-box');
      face.setAttribute('width','0.075'); face.setAttribute('height','0.006');
      face.setAttribute('depth','0.058'); face.setAttribute('color','#1a1a1a');
      face.setAttribute('position','0 0.032 0');
      this.el.appendChild(face);

      // screen glow
      const screen = document.createElement('a-plane');
      screen.setAttribute('width','0.066'); screen.setAttribute('height','0.050');
      screen.setAttribute('color','#001500'); screen.setAttribute('position','0 0.038 0');
      screen.setAttribute('rotation','-90 0 0');
      this.el.appendChild(screen);

      // money line
      this.moneyTxt = document.createElement('a-text');
      this.moneyTxt.setAttribute('value','$15');
      this.moneyTxt.setAttribute('position','0 0.040 0.006');
      this.moneyTxt.setAttribute('rotation','-90 0 0');
      this.moneyTxt.setAttribute('align','center');
      this.moneyTxt.setAttribute('color','#00ff55');
      this.moneyTxt.setAttribute('width','0.26');
      this.moneyTxt.setAttribute('wrap-count','6');
      this.el.appendChild(this.moneyTxt);

      // player count line
      this.playersTxt = document.createElement('a-text');
      this.playersTxt.setAttribute('value','P:1');
      this.playersTxt.setAttribute('position','0 0.040 -0.014');
      this.playersTxt.setAttribute('rotation','-90 0 0');
      this.playersTxt.setAttribute('align','center');
      this.playersTxt.setAttribute('color','#55aaff');
      this.playersTxt.setAttribute('width','0.22');
      this.playersTxt.setAttribute('wrap-count','5');
      this.el.appendChild(this.playersTxt);

      // strap
      const strap = document.createElement('a-cylinder');
      strap.setAttribute('radius','0.018'); strap.setAttribute('height','0.1');
      strap.setAttribute('color','#111111'); strap.setAttribute('rotation','0 0 90');
      strap.setAttribute('position','0 0.030 0');
      this.el.appendChild(strap);

      this._lastMoney = 15; this._lastP = -1;
    },
    tick: function () {
      const m = window._money || 0;
      if (m !== this._lastMoney) {
        this.moneyTxt.setAttribute('value', '$' + m);
        this._lastMoney = m;
      }
      let p = 1;
      try { p = Object.keys(NAF.connection.connectedClients).length + 1; } catch(e) {}
      if (p !== this._lastP) {
        this.playersTxt.setAttribute('value', 'P:' + p);
        this._lastP = p;
      }
    }
  });

  // ════════════════════════════════════════════════════
  // TERMINAL KEY
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('terminal-key', {
    schema: { value: { type: 'string' } },
    init: function () {
      this.el.addEventListener('click', () => {
        const disp = document.querySelector('#terminal-display'); if (!disp) return;
        const v = this.data.value;
        let cur = disp.getAttribute('value') || '';
        if (cur.startsWith('JOIN') || cur.startsWith('ERR')) cur = '';
        if (v === 'DEL') {
          disp.setAttribute('value', cur.length > 1 ? cur.slice(0,-1) : 'ENTER CODE');
        } else if (v === 'ENTER') {
          const code = cur.trim().toUpperCase();
          if (code.length < 2) { disp.setAttribute('value','ERR: SHORT'); return; }
          disp.setAttribute('value','JOINING...');
          try { NAF.connection.adapter.socket.disconnect(); } catch(e) {}
          setTimeout(() => {
            document.querySelector('a-scene').setAttribute('networked-scene','room',code);
            document.querySelector('a-scene').components['networked-scene'].connect();
            disp.setAttribute('value','JOINED:\n' + code);
          }, 500);
        } else {
          disp.setAttribute('value', ((cur === 'ENTER CODE' ? '' : cur) + v).slice(0, 8));
        }
      });
    }
  });

  // ════════════════════════════════════════════════════
  // BUYING STATION — scrollable shop
  // ════════════════════════════════════════════════════
  window._shopItems = [
    { name: 'HOOKSHOT',  price: 0,  desc: 'FREE',     color: '#88ff88' },
    { name: 'GRENADE',   price: 10, desc: '$10 / B·Y', color: '#ff9944' },
  ];
  window._shopIndex = 0;

  AFRAME.registerComponent('shop-prev-btn', {
    init: function () {
      this.el.addEventListener('click', () => {
        const n = window._shopItems.length;
        window._shopIndex = (window._shopIndex - 1 + n) % n;
        _updateShopDisplay();
      });
    }
  });
  AFRAME.registerComponent('shop-next-btn', {
    init: function () {
      this.el.addEventListener('click', () => {
        const n = window._shopItems.length;
        window._shopIndex = (window._shopIndex + 1) % n;
        _updateShopDisplay();
      });
    }
  });

  function _updateShopDisplay() {
    const item = window._shopItems[window._shopIndex];
    const nameEl = document.querySelector('#shop-item-name');
    const descEl = document.querySelector('#shop-item-desc');
    const previewEl = document.querySelector('#shop-item-preview');
    if (nameEl) nameEl.setAttribute('value', item.name);
    if (descEl) { descEl.setAttribute('value', item.desc); descEl.setAttribute('color', item.color); }
    // Update preview color
    if (previewEl) {
      if (item.name === 'HOOKSHOT')  previewEl.setAttribute('color','#666');
      else if (item.name === 'GRENADE') previewEl.setAttribute('color','#3a5a22');
      else previewEl.setAttribute('color','#7a8a9a');
    }
  }

  AFRAME.registerComponent('shop-buy-btn', {
    init: function () {
      this.el.addEventListener('click', () => {
        const item = window._shopItems[window._shopIndex];
        const lbl  = document.querySelector('#shop-buy-label');
        const rig  = document.querySelector('#rig');

        function flash(msg, col) {
          if (!lbl) return;
          lbl.setAttribute('value', msg);
          lbl.setAttribute('color', col);
          setTimeout(() => { lbl.setAttribute('value','BUY'); lbl.setAttribute('color','#00ff88'); }, 2000);
        }

        if (item.price > 0 && window._money < item.price) {
          flash('BROKE!', '#ff4444'); return;
        }

        // Deduct cost
        window._money -= item.price;

        // Spawn item in front of player
        const pos = new THREE.Vector3();
        if (rig) {
          pos.copy(rig.object3D.position);
          const head = document.querySelector('#head');
          const dir = new THREE.Vector3(0, 0, -1);
          if (head) head.object3D.getWorldDirection(dir);
          dir.y = 0; dir.normalize();
          pos.addScaledVector(dir, 1.2);
          pos.y = 1.0;
        }

        if (item.name === 'HOOKSHOT') {
          let gun = document.querySelector('#hookshot-gun');
          if (gun) {
            gun.object3D.position.set(pos.x, pos.y, pos.z);
          } else {
            gun = document.createElement('a-entity');
            gun.setAttribute('id','hookshot-gun');
            gun.setAttribute('position',`${pos.x} ${pos.y} ${pos.z}`);
            const barrel = document.createElement('a-cylinder');
            barrel.setAttribute('radius','0.035'); barrel.setAttribute('height','0.32');
            barrel.setAttribute('color','#666');   barrel.setAttribute('rotation','90 0 0');
            barrel.setAttribute('position','0 0 -0.1'); barrel.setAttribute('segments-radial','6');
            const body = document.createElement('a-box');
            body.setAttribute('width','0.09'); body.setAttribute('height','0.13');
            body.setAttribute('depth','0.18'); body.setAttribute('color','#222');
            const grip = document.createElement('a-box');
            grip.setAttribute('width','0.06'); grip.setAttribute('height','0.12');
            grip.setAttribute('depth','0.07'); grip.setAttribute('color','#444');
            grip.setAttribute('position','0 -0.1 0.04'); grip.setAttribute('rotation','15 0 0');
            gun.appendChild(barrel); gun.appendChild(body); gun.appendChild(grip);
            document.querySelector('a-scene').appendChild(gun);
          }
          flash('SPAWNED!', '#00ff88');

        } else if (item.name === 'GRENADE') {
          ['#leftHand','#rightHand'].forEach(id => {
            const hand = document.querySelector(id);
            if (!hand) return;
            if (!hand.components['grenade-hand']) hand.setAttribute('grenade-hand','');
            setTimeout(() => {
              const gc = hand.components['grenade-hand'];
              if (gc) gc.armGrenade();
            }, 50);
          });
          flash('ARMED! B/Y', '#ff9900');
        }
      });
    }
  });

  // ════════════════════════════════════════════════════
  // SKIN BUTTON
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('skin-button', {
    schema: { color: { type: 'string' } },
    init: function () {
      this.el.addEventListener('click', () => {
        const color = this.data.color;
        // Store on window for NAF schema to broadcast
        window._skinColor = color;
        // Update remote-visible avatar parts (networked templates)
        document.querySelectorAll('.avatar-part').forEach(p =>
          p.setAttribute('material','color', color));
        // Update the rig's own networked material so others see it
        const rig = document.querySelector('#rig');
        if (rig) rig.setAttribute('material','color', color);
        // Update wrist watch / hand colors
        document.querySelectorAll('#leftHand, #rightHand').forEach(hand => {
          if (hand) {
            hand.setAttribute('material','color', color);
            // Update any child boxes on the hand (glove visual)
            hand.querySelectorAll('a-box').forEach(b => b.setAttribute('material','color', color));
          }
        });
      });
    }
  });

  // ════════════════════════════════════════════════════
  // STEEL BAR PICKUP (can pick up and sell for $11)
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('steel-bar-pickup', {
    init: function () {
      this.held = false;
      this.handEl = null;

      // Listen for grip buttons on both hands
      ['#leftHand', '#rightHand'].forEach(id => {
        const hand = document.querySelector(id);
        if (hand) {
          hand.addEventListener('gripdown', (evt) => {
            if (this.held || window._isDead) return;
            const hp = new THREE.Vector3();
            hand.object3D.getWorldPosition(hp);
            const bp = new THREE.Vector3();
            this.el.object3D.getWorldPosition(bp);
            if (hp.distanceTo(bp) < 0.5) {
              this.held = true;
              this.handEl = hand;
              hand.object3D.add(this.el.object3D);
              this.el.object3D.position.set(0, -0.1, -0.15);
              this.el.object3D.rotation.set(0, 0, 0);
            }
          });
        }
      });
    },
    tick: function () {
      if (!this.held && this.el.object3D.position.y < 0) {
        this.el.object3D.position.y = 0.3;
      }
    }
  });

  // ════════════════════════════════════════════════════
  // SELLING MACHINE (grinder - sells steel bar $11, egg $200-300)
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('selling-machine', {
    init: function () {
      this.valueDisplay = document.querySelector('#grinder-value-display');

      this.el.addEventListener('click', () => {
        const disp = this.valueDisplay;

        // Check egg first (higher value)
        const egg = document.querySelector('#chicken-egg');
        if (egg) {
          const ec = egg.components['egg-pickup'];
          if (ec && ec.held) {
            const payout = 200 + Math.floor(Math.random() * 101); // $200-$300
            window._money += payout;
            ec.held = false;
            if (ec.handEl) {
              document.querySelector('a-scene').object3D.attach(egg.object3D);
              ec.handEl = null;
            }
            if (egg.parentNode) egg.parentNode.removeChild(egg);
            // Egg sold — respawn it in nest after 30 seconds
            window._eggStolen = false;
            setTimeout(_spawnEgg, 30000);
            if (disp) {
              disp.setAttribute('value', `EGG SOLD!\n+$${payout}`);
              disp.setAttribute('color', '#ffdd00');
              setTimeout(() => {
                disp.setAttribute('value','GRINDER\nSELL ITEMS\n$$$');
                disp.setAttribute('color','#ffaa44');
              }, 2000);
            }
            return;
          }
        }

        // Check steel bar
        const steelBar = document.querySelector('#steel-bar');
        if (steelBar) {
          const barComp = steelBar.components['steel-bar-pickup'];
          if (barComp && barComp.held) {
            window._money += 11;
            barComp.held = false;
            if (barComp.handEl) {
              document.querySelector('a-scene').object3D.attach(steelBar.object3D);
              barComp.handEl = null;
            }
            if (steelBar.parentNode) steelBar.parentNode.removeChild(steelBar);
            if (disp) {
              disp.setAttribute('value','SOLD!\n+$11');
              disp.setAttribute('color','#00ff00');
              setTimeout(() => {
                disp.setAttribute('value','GRINDER\nSELL ITEMS\n$$$');
                disp.setAttribute('color','#ffaa44');
              }, 1500);
            }
            return;
          }
        }

        // Nothing to sell
        if (disp) {
          disp.setAttribute('value','HOLD ITEM\nTO SELL!');
          disp.setAttribute('color','#ff4444');
          setTimeout(() => {
            disp.setAttribute('value','GRINDER\nSELL ITEMS\n$$$');
            disp.setAttribute('color','#ffaa44');
          }, 1500);
        }
      });
    }
  });

  // ════════════════════════════════════════════════════
  // EGG PICKUP  (grip to hold, sell at grinder for $200-$300)
  // ════════════════════════════════════════════════════
  AFRAME.registerComponent('egg-pickup', {
    init: function () {
      this.held    = false;
      this.handEl  = null;
      this._stolen = false;  // did player grab it from the nest?

      ['#leftHand','#rightHand'].forEach(id => {
        const hand = document.querySelector(id);
        if (!hand) return;
        hand.addEventListener('gripdown', () => {
          if (this.held || window._isDead) return;
          const hp = new THREE.Vector3(), ep = new THREE.Vector3();
          hand.object3D.getWorldPosition(hp);
          this.el.object3D.getWorldPosition(ep);
          if (hp.distanceTo(ep) < 0.6) {
            this.held   = true;
            this.handEl = hand;
            this._stolen = true;
            hand.object3D.add(this.el.object3D);
            this.el.object3D.position.set(0, 0.12, -0.14);
            this.el.object3D.rotation.set(0, 0, 0);
            // Alert chicken that egg is gone
            window._eggStolen = true;
            const lbl = this.el.querySelector('.egg-label');
            if (lbl) lbl.setAttribute('value','🥚 STOLEN!');
          }
        });
        hand.addEventListener('gripup', () => {
          if (!this.held || this.handEl !== hand) return;
          this.held = false;
          const scene = document.querySelector('a-scene');
          scene.object3D.attach(this.el.object3D);
          // drop it roughly where hand is
          const wp = new THREE.Vector3();
          hand.object3D.getWorldPosition(wp);
          this.el.object3D.position.set(wp.x, Math.max(0.18, wp.y - 0.1), wp.z);
          this.handEl = null;
          const lbl = this.el.querySelector('.egg-label');
          if (lbl) lbl.setAttribute('value','EGG\n$200-300\nGRIP');
        });
      });
    },
    tick: function () {
      if (!this.held && this.el.object3D.position.y < 0.15) {
        this.el.object3D.position.y = 0.15;
      }
    }
  });

  // ════════════════════════════════════════════════════
  // CHICKEN AI  — patrols nest, chases & poisons player
  // ════════════════════════════════════════════════════
  window._eggStolen     = false;
  window._chickenPoison = false;
  window._poisonInterval= null;

  AFRAME.registerComponent('chicken-ai', {
    schema: {
      homeX: { default: -12 },
      homeZ: { default: -14 }
    },
    init: function () {
      this.state      = 'patrol';   // patrol | chase | return
      this.patrolAngle= 0;
      this.alertTimer = 0;
      this._poisoning = false;

      // bobbing anim
      this._bobT = 0;
    },

    tick: function (t, dt) {
      if (window._isDead) { this._stopPoison(); return; }
      const sec = Math.min(dt, 50) / 1000;
      const rig = document.querySelector('#rig');
      if (!rig) return;

      const cp = this.el.object3D.position;
      const rp = rig.object3D.position;

      const dx = rp.x - cp.x;
      const dz = rp.z - cp.z;
      const distToPlayer = Math.sqrt(dx*dx + dz*dz);

      // ── state transitions ──
      if (window._eggStolen || distToPlayer < 5) {
        this.state = 'chase';
      } else if (this.state === 'chase' && !window._eggStolen && distToPlayer > 12) {
        this.state = 'return';
      }

      const homeX = this.data.homeX;
      const homeZ = this.data.homeZ;

      if (this.state === 'patrol') {
        this.patrolAngle += sec * 0.6;
        const tx = homeX + Math.cos(this.patrolAngle) * 3;
        const tz = homeZ + Math.sin(this.patrolAngle) * 3;
        const pdx = tx - cp.x, pdz = tz - cp.z;
        const pl = Math.sqrt(pdx*pdx + pdz*pdz) + 0.001;
        cp.x += (pdx/pl) * 1.5 * sec;
        cp.z += (pdz/pl) * 1.5 * sec;
        cp.y = 0;

      } else if (this.state === 'chase') {
        const len = distToPlayer + 0.001;
        const speed = window._eggStolen ? 5.5 : 4.0;
        cp.x += (dx/len) * speed * sec;
        cp.z += (dz/len) * speed * sec;
        cp.y = 0;

        // face player
        this.el.object3D.rotation.y = Math.atan2(dx, dz);

        // POISON if very close
        if (distToPlayer < 1.2) {
          if (!this._poisoning) this._startPoison();
        } else {
          this._stopPoison();
        }

      } else if (this.state === 'return') {
        this._stopPoison();
        const rdx = homeX - cp.x, rdz = homeZ - cp.z;
        const rl  = Math.sqrt(rdx*rdx + rdz*rdz) + 0.001;
        if (rl < 0.3) { this.state = 'patrol'; }
        else {
          cp.x += (rdx/rl) * 2.5 * sec;
          cp.z += (rdz/rl) * 2.5 * sec;
          cp.y = 0;
        }
      }

      // bob up/down when moving
      this._bobT += sec * 8;
      const bodyEl = this.el.querySelector('.chicken-body');
      if (bodyEl) bodyEl.object3D.position.y = 0.42 + Math.abs(Math.sin(this._bobT)) * 0.07;

      // bob head
      const headEl = this.el.querySelector('.chicken-head');
      if (headEl) headEl.object3D.position.y = 0.78 + Math.sin(this._bobT * 1.5) * 0.04;

      // flap wings when chasing
      const wingL = this.el.querySelector('.wing-l');
      const wingR = this.el.querySelector('.wing-r');
      if (wingL && this.state === 'chase') {
        wingL.object3D.rotation.z =  0.4 + Math.sin(this._bobT * 3) * 0.5;
        wingR.object3D.rotation.z = -0.4 - Math.sin(this._bobT * 3) * 0.5;
      }
    },

    _startPoison: function () {
      if (this._poisoning) return;
      this._poisoning = true;
      window._chickenPoison = true;

      // Show warning on HUD
      let warn = document.getElementById('chicken-bite-warn');
      if (!warn) {
        warn = document.createElement('div');
        warn.id = 'chicken-bite-warn';
        warn.style.cssText = 'position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-family:Georgia,serif;font-size:36px;color:#ffaa00;text-shadow:0 0 20px #ff6600;z-index:9500;pointer-events:none;text-align:center;';
        warn.textContent = '🐔 CHICKEN BITING YOU!';
        document.body.appendChild(warn);
      }
      warn.style.display = 'block';

      // deal 1 hp of "slow death" — after 8 seconds of continuous contact → die
      this._biteCount = 0;
      this._poisonTimer = setInterval(() => {
        if (!window._chickenPoison || window._isDead) { this._stopPoison(); return; }
        this._biteCount++;
        // flash screen red
        const ov = document.getElementById('death-overlay');
        if (ov) {
          ov.style.display = 'flex';
          ov.style.background = `rgba(180,0,0,${0.05 + this._biteCount*0.04})`;
        }
        if (this._biteCount >= 8) {
          this._stopPoison();
          _die(document.querySelector('#rig').object3D.position.clone());
        }
      }, 1000);
    },

    _stopPoison: function () {
      if (!this._poisoning) return;
      this._poisoning = false;
      window._chickenPoison = false;
      clearInterval(this._poisonTimer);
      this._biteCount = 0;

      const warn = document.getElementById('chicken-bite-warn');
      if (warn) warn.style.display = 'none';

      // clear red tint if not actually dead
      if (!window._isDead) {
        const ov = document.getElementById('death-overlay');
        if (ov) { ov.style.display = 'none'; ov.style.background = ''; }
      }
    }
  });

  // ════════════════════════════════════════════════════
  // NAF SCHEMAS  (must run before scene initialises)
  // ════════════════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', () => {
    NAF.schemas.add({
      template: '#avatar-head-template',
      components: [
        'position',
        'rotation',
        'visible',
        { component: 'material', property: 'color' }
      ]
    });
    NAF.schemas.add({
      template: '#avatar-hand-template',
      components: [
        'position',
        'rotation',
        'visible',
        { component: 'material', property: 'color' }
      ]
    });
    // Initialize shop display once scene loads
    setTimeout(_updateShopDisplay, 500);
    // Spawn the egg in the chicken's nest
    setTimeout(_spawnEgg, 800);
  });
  </script>
</head>
<body>

  <!-- FREDERICK COMPANY VR LOADING SCREEN -->
  <div id="fc-vr-screen">
    <div class="fc-logo">Frederick Company</div>
    <div class="fc-sub">Presents</div>
    <div class="fc-divider"></div>
    <div class="fc-tagline">Gorilla Arena</div>
    <div class="fc-bar-wrap"><div class="fc-bar"></div></div>
  </div>

  <!-- DEATH OVERLAY -->
  <div id="death-overlay">
    <div id="you-died-text">YOU DIED</div>
    <div id="respawn-hint">HOLD  Y  FOR  3  SECONDS  TO  RESPAWN</div>
    <div id="respawn-bar-wrap"><div id="respawn-bar"></div></div>
  </div>

  <a-scene
    networked-scene="room: lobby; debug: false; adapter: socketio; serverURL: https://naframes.com/; audio: true; connectOnLoad: true;"
    renderer="antialias: false; colorManagement: false;"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: true">

    <a-assets timeout="10000">
      <!-- ── REMOTE PLAYER HEAD (spawns at rig root, offset up 1.6 in template) ── -->
      <template id="avatar-head-template">
        <a-entity visible="true">
          <!-- head sphere at eye height -->
          <a-sphere class="avatar-part" radius="0.28" color="#ff4444"
                    position="0 1.6 0" visible="true"
                    networked-audio-source></a-sphere>
          <a-cone radius-bottom="0.04" radius-top="0" height="0.17"
                  position="0 1.6 -0.24" rotation="90 0 0"
                  color="#ffccaa" visible="true"></a-cone>
          <a-sphere radius="0.05" color="#111" position="-0.10 1.68 -0.22" visible="true"></a-sphere>
          <a-sphere radius="0.05" color="#111" position=" 0.10 1.68 -0.22" visible="true"></a-sphere>
          <!-- body stub so player silhouette is visible -->
          <a-cylinder class="avatar-part" radius="0.18" height="0.8" color="#ff4444"
                      position="0 1.0 0" segments-radial="8" visible="true"></a-cylinder>
          <!-- arms to make player more visible -->
          <a-cylinder class="avatar-part" radius="0.06" height="0.5" color="#ff4444"
                      position="-0.25 1.1 0" rotation="0 0 20" segments-radial="6" visible="true"></a-cylinder>
          <a-cylinder class="avatar-part" radius="0.06" height="0.5" color="#ff4444"
                      position="0.25 1.1 0" rotation="0 0 -20" segments-radial="6" visible="true"></a-cylinder>
        </a-entity>
      </template>

      <!-- ── REMOTE PLAYER HANDS ── -->
      <template id="avatar-hand-template">
        <a-entity visible="true">
          <a-box class="avatar-part" width="0.12" height="0.09" depth="0.15"
                 color="#ff4444" visible="true"></a-box>
        </a-entity>
      </template>
    </a-assets>

    <!-- SKY -->
    <a-sky color="#a8c4a0"></a-sky>

    <!-- GROUND -->
    <a-plane rotation="-90 0 0" width="120" height="120" color="#b8955a"></a-plane>
    <a-plane rotation="-90 15 0"  width="30" height="20" color="#8a7040" position="4 0.01 -5"></a-plane>
    <a-plane rotation="-90 -20 0" width="20" height="15" color="#9b6e35" position="-8 0.01 -12"></a-plane>
    <a-plane rotation="-90 5 0"   width="40" height="30" color="#6b8c3e" position="0 0.01 -20"></a-plane>

    <!-- CLIFFS -->
    <a-box position="0 8 -28"      width="60" height="18" depth="8"  color="#7a6b52"></a-box>

      <a-cone position="0 0.55 0.28" radius-bottom="0.08" radius-top="0.01"
              height="0.22" color="#ddd8c0" rotation="-50 0 0" segments-radial="5"></a-cone>
      <a-cone position="-0.07 0.58 0.26" radius-bottom="0.06" radius-top="0.01"
              height="0.2" color="#ccc8b0" rotation="-45 -15 0" segments-radial="4"></a-cone>
      <a-cone position=" 0.07 0.58 0.26" radius-bottom="0.06" radius-top="0.01"
              height="0.2" color="#ccc8b0" rotation="-45 15 0" segments-radial="4"></a-cone>
      <!-- legs -->
      <a-cylinder position="-0.1 0.14 0.04" radius="0.03" height="0.28" color="#ff9900"></a-cylinder>
      <a-cylinder position=" 0.1 0.14 0.04" radius="0.03" height="0.28" color="#ff9900"></a-cylinder>
      <!-- feet -->
      <a-box position="-0.1 0.01 0.06" width="0.08" height="0.04" depth="0.14" color="#ff8800"></a-box>
      <a-box position=" 0.1 0.01 0.06" width="0.08" height="0.04" depth="0.14" color="#ff8800"></a-box>
    </a-entity>

    <!-- ════════════════════════════════
         PLAYER RIG
    ════════════════════════════════ -->
    <a-entity id="rig" position="0 0 0" gravity-body
              networked="template:#avatar-head-template; attachTemplateToLocal:false;">

      <!-- HEAD — camera only, NOT separately networked (rig handles head pos) -->
      <a-entity id="head"
                camera
                position="0 1.6 0">
      </a-entity>

      <!-- LEFT HAND -->
      <a-entity id="leftHand"
                oculus-touch-controls="hand: left"
                gorilla-hand
                hookshot-hand
                pickup-hand="hand: left"
                grenade-hand
                networked="template:#avatar-hand-template; attachTemplateToLocal:false;">
        <!-- WRIST WATCH -->
        <a-entity wrist-watch position="0 0.06 0.01" rotation="0 0 -90"></a-entity>
      </a-entity>

      <!-- RIGHT HAND -->
      <a-entity id="rightHand"
                oculus-touch-controls="hand: right"
                gorilla-hand
                hookshot-hand
                pickup-hand="hand: right"
                grenade-hand
                laser-controls="hand: right"
                raycaster="near: 0; far: 10; objects: .raycastable"
                networked="template:#avatar-hand-template; attachTemplateToLocal:false;">
      </a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
